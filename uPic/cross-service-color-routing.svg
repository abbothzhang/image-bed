<svg width="1280" height="690" viewBox="0 0 1280 690" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1220" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F2F7FC"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="okCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="warnCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFE7D1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#64748B"/>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#DCE5EF" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="690" rx="32" fill="url(#bg)"/>
  <rect x="24" y="24" width="1232" height="642" rx="24" fill="url(#grid)" opacity="0.45"/>

  <text x="640" y="82" text-anchor="middle" fill="#0F172A" font-size="34" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">跨服务调用颜色兼容对比</text>
  <text x="640" y="120" text-anchor="middle" fill="#475569" font-size="18" font-weight="500" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">有去标时调用链同色一致，无去标时会出现跨颜色路由兼容问题</text>

  <g>
    <rect x="64" y="164" width="526" height="418" rx="28" fill="url(#okCard)" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
    <text x="98" y="210" fill="#166534" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">有去标</text>

    <rect x="96" y="264" width="210" height="88" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="201" y="318" text-anchor="middle" fill="#1E3A8A" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(正常)</text>
    <line x1="322" y1="308" x2="388" y2="308" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="412" y="264" width="146" height="88" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="485" y="318" text-anchor="middle" fill="#1E3A8A" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(正常)</text>
    <text x="327" y="384" fill="#059669" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">标识一致，路由简单 ✅</text>

    <rect x="96" y="432" width="210" height="88" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="201" y="486" text-anchor="middle" fill="#6D28D9" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <line x1="322" y1="476" x2="388" y2="476" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="412" y="432" width="146" height="88" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="485" y="486" text-anchor="middle" fill="#6D28D9" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)</text>
    <text x="327" y="540" fill="#059669" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">标识一致，路由简单 ✅</text>
  </g>

  <g>
    <rect x="624" y="164" width="592" height="446" rx="28" fill="url(#warnCard)" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
    <text x="658" y="210" fill="#9A3412" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">无去标（第二轮后）</text>

    <rect x="656" y="280" width="170" height="96" rx="24" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="741" y="338" text-anchor="middle" fill="#6D28D9" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <line x1="842" y1="328" x2="918" y2="328" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="942" y="280" width="170" height="96" rx="24" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="1027" y="338" text-anchor="middle" fill="#2563EB" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>

    <text x="741" y="432" text-anchor="middle" fill="#DC2626" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">⚠ 标识不一致</text>
    <text x="658" y="474" fill="#9A3412" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰色流量调用 B 时，B 没有灰色 provider，</text>
    <text x="658" y="508" fill="#9A3412" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">只有蓝色 provider</text>
    <text x="658" y="546" fill="#9A3412" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">需要额外兼容规则：灰色流量允许访问蓝色 provider</text>
    <text x="658" y="566" fill="#DC2626" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">每个中间件都要维护颜色兼容矩阵</text>
  </g>
</svg>

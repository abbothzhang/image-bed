<svg width="1280" height="1180" viewBox="0 0 1280 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="60" x2="1180" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#E9E4FF"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#DDF8EA"/>
    </linearGradient>
    <linearGradient id="neutralCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowDark" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#475569"/>
    </marker>
    <marker id="arrowPurple" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#7C3AED"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#059669"/>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#DCE5EF" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="1180" rx="36" fill="url(#bg)"/>
  <rect x="32" y="32" width="1216" height="1116" rx="28" fill="url(#grid)" opacity="0.55"/>

  <text x="640" y="96" text-anchor="middle" fill="#0F172A" font-size="34" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">全链路灰度流量隔离模型</text>
  <text x="640" y="136" text-anchor="middle" fill="#475569" font-size="18" font-weight="500" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">Ingress 根据规则打标，灰度标识沿服务链路和消息链路持续透传</text>

  <g>
    <rect x="500" y="180" width="280" height="88" rx="24" fill="url(#neutralCard)" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
    <text x="640" y="233" text-anchor="middle" fill="#0F172A" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">用户请求</text>
  </g>

  <line x1="640" y1="268" x2="640" y2="342" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDark)"/>

  <g>
    <rect x="450" y="342" width="380" height="128" rx="28" fill="url(#neutralCard)" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
    <text x="640" y="404" text-anchor="middle" fill="#0F172A" font-size="34" font-weight="700" font-family="SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">Ingress</text>
    <text x="640" y="442" text-anchor="middle" fill="#475569" font-size="22" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">lua 脚本执行灰度规则</text>
  </g>

  <line x1="548" y1="470" x2="420" y2="548" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <line x1="732" y1="470" x2="860" y2="548" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <text x="294" y="530" text-anchor="middle" fill="#6D28D9" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">命中灰度规则</text>
  <text x="294" y="558" text-anchor="middle" fill="#7C3AED" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">打上 gray 标识</text>

  <text x="986" y="524" text-anchor="middle" fill="#047857" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">未命中规则</text>
  <text x="986" y="552" text-anchor="middle" fill="#059669" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">保持正常流量</text>

  <g>
    <rect x="180" y="560" width="360" height="92" rx="24" fill="url(#leftCard)" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="616" text-anchor="middle" fill="#4C1D95" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰度流量</text>
  </g>

  <g>
    <rect x="740" y="560" width="360" height="92" rx="24" fill="url(#rightCard)" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
    <text x="920" y="616" text-anchor="middle" fill="#065F46" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">正常流量</text>
  </g>

  <line x1="360" y1="652" x2="360" y2="734" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <line x1="920" y1="652" x2="920" y2="734" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <g>
    <rect x="140" y="734" width="440" height="126" rx="28" fill="url(#leftCard)" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="791" text-anchor="middle" fill="#4C1D95" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A 灰度部署</text>
    <text x="360" y="835" text-anchor="middle" fill="#6D28D9" font-size="22" font-weight="600" font-family="SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">(gray 标识)</text>
  </g>

  <g>
    <rect x="700" y="734" width="440" height="126" rx="28" fill="url(#rightCard)" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
    <text x="920" y="791" text-anchor="middle" fill="#065F46" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A 正常部署</text>
    <text x="920" y="835" text-anchor="middle" fill="#047857" font-size="22" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">(无标识)</text>
  </g>

  <line x1="360" y1="860" x2="360" y2="942" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <line x1="920" y1="860" x2="920" y2="942" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <text x="498" y="910" text-anchor="middle" fill="#6D28D9" font-size="19" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰度标识透传</text>
  <text x="1030" y="910" text-anchor="middle" fill="#047857" font-size="19" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">正常调用</text>

  <g>
    <rect x="140" y="942" width="440" height="126" rx="28" fill="url(#leftCard)" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="999" text-anchor="middle" fill="#4C1D95" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B 灰度部署</text>
    <text x="360" y="1043" text-anchor="middle" fill="#6D28D9" font-size="22" font-weight="600" font-family="SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">(gray 标识)</text>
  </g>

  <g>
    <rect x="700" y="942" width="440" height="126" rx="28" fill="url(#rightCard)" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
    <text x="920" y="999" text-anchor="middle" fill="#065F46" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B 正常部署</text>
    <text x="920" y="1043" text-anchor="middle" fill="#047857" font-size="22" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">(无标识)</text>
  </g>

  <line x1="360" y1="1068" x2="360" y2="1122" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <line x1="920" y1="1068" x2="920" y2="1122" stroke="#059669" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <g>
    <rect x="98" y="1122" width="524" height="44" rx="18" fill="#EDE9FE"/>
    <text x="360" y="1151" text-anchor="middle" fill="#4C1D95" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">Pulsar 灰度 consumer 继续消费携带 gray 标识的消息</text>
  </g>

  <g>
    <rect x="658" y="1122" width="524" height="44" rx="18" fill="#DFF7EB"/>
    <text x="920" y="1151" text-anchor="middle" fill="#065F46" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">Pulsar 正常 consumer 处理常规消息链路</text>
  </g>
</svg>

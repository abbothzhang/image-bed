<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">大促保障架构</title>
  <desc id="desc">用户流量经过 CDN、网关、应用服务集群，并连接缓存、消息队列、数据库与监控告警。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f9fb"/>
      <stop offset=".55" stop-color="#eef6f2"/>
      <stop offset="1" stop-color="#f8f3e8"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173b61"/>
      <stop offset="1" stop-color="#0f756d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#14334a" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#496879"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8aa1ad"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
      .title { fill: #132f43; font-size: 36px; font-weight: 900; }
      .sub { fill: #60798b; font-size: 18px; }
      .nodeTitle { fill: #17364c; font-size: 25px; font-weight: 900; }
      .nodeSub { fill: #617889; font-size: 17px; font-weight: 700; }
      .whiteTitle { fill: #fff; font-size: 30px; font-weight: 900; }
      .whiteSub { fill: rgba(255,255,255,.88); font-size: 18px; font-weight: 700; }
      .tag { fill: #2f5966; font-size: 15px; font-weight: 800; letter-spacing: 1px; }
      .line { fill: none; stroke: #496879; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
      .softLine { fill: none; stroke: #8aa1ad; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 8 9; marker-end: url(#arrowSoft); }
    </style>
  </defs>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="1140" cy="120" r="145" fill="#d8eadf" opacity=".52"/>
  <circle cx="130" cy="650" r="190" fill="#d9e8f4" opacity=".6"/>
  <text x="70" y="76" class="tag">HIGH TRAFFIC PROTECTION ARCHITECTURE</text>
  <text x="70" y="122" class="title">大促保障架构</text>
  <text x="70" y="154" class="sub">用缓存、削峰、读写分离、限流降级和监控闭环支撑高峰稳定性</text>

  <g transform="translate(72 228)">
    <rect width="204" height="112" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="102" y="51" text-anchor="middle" class="nodeTitle">用户流量</text>
    <text x="102" y="84" text-anchor="middle" class="nodeSub">入口请求</text>
  </g>

  <g transform="translate(326 228)">
    <rect width="204" height="112" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="102" y="51" text-anchor="middle" class="nodeTitle">CDN</text>
    <text x="102" y="84" text-anchor="middle" class="nodeSub">边缘缓存</text>
  </g>

  <g transform="translate(580 228)">
    <rect width="248" height="112" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="124" y="51" text-anchor="middle" class="nodeTitle">接入层 / 网关</text>
    <text x="124" y="84" text-anchor="middle" class="nodeSub">访问控制与路由</text>
  </g>

  <g transform="translate(862 190)">
    <rect width="320" height="160" rx="34" fill="url(#core)" filter="url(#shadow)"/>
    <text x="160" y="59" text-anchor="middle" class="whiteTitle">应用服务集群</text>
    <text x="160" y="95" text-anchor="middle" class="whiteSub">核心业务、接口编排、策略执行</text>
    <rect x="64" y="112" width="94" height="28" rx="14" fill="#ffffff" opacity=".16"/>
    <rect x="174" y="112" width="88" height="28" rx="14" fill="#ffffff" opacity=".16"/>
    <text x="111" y="132" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">HPA</text>
    <text x="218" y="132" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">回滚</text>
  </g>

  <path class="line" d="M276 284 H308"/>
  <path class="line" d="M530 284 H562"/>
  <path class="line" d="M828 284 H844"/>

  <g transform="translate(166 472)">
    <rect width="250" height="118" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="125" y="50" text-anchor="middle" class="nodeTitle">Redis / 本地缓存</text>
    <text x="125" y="82" text-anchor="middle" class="nodeSub">热点数据提前预热</text>
  </g>

  <g transform="translate(462 472)">
    <rect width="250" height="118" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="125" y="50" text-anchor="middle" class="nodeTitle">消息队列削峰</text>
    <text x="125" y="82" text-anchor="middle" class="nodeSub">异步化与流量缓冲</text>
  </g>

  <g transform="translate(758 472)">
    <rect width="250" height="118" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="125" y="50" text-anchor="middle" class="nodeTitle">主从数据库</text>
    <text x="125" y="82" text-anchor="middle" class="nodeSub">水位、慢查询、容量</text>
  </g>

  <g transform="translate(1050 472)">
    <rect width="132" height="118" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="66" y="47" text-anchor="middle" class="nodeTitle">监控</text>
    <text x="66" y="78" text-anchor="middle" class="nodeSub">告警</text>
  </g>

  <g transform="translate(166 632)">
    <rect width="230" height="58" rx="20" fill="#e4f0ec"/>
    <text x="32" y="37" fill="#295c56" font-size="18" font-weight="900">热点缓存</text>
  </g>

  <g transform="translate(758 632)">
    <rect width="230" height="58" rx="20" fill="#e9eef4"/>
    <text x="32" y="37" fill="#31536c" font-size="18" font-weight="900">读写分离</text>
  </g>

  <g transform="translate(462 632)">
    <rect width="230" height="58" rx="20" fill="#f1e8d8"/>
    <text x="32" y="37" fill="#76511e" font-size="18" font-weight="900">限流降级</text>
  </g>

  <path class="line" d="M952 350 C880 430, 530 410, 306 472"/>
  <path class="line" d="M1002 350 C940 420, 728 418, 594 472"/>
  <path class="line" d="M1048 350 C1042 402, 990 433, 916 472"/>
  <path class="line" d="M291 590 V616"/>
  <path class="line" d="M883 590 V616"/>
  <path class="line" d="M587 590 V616"/>
  <path class="softLine" d="M1078 350 C1140 388, 1128 430, 1116 464"/>
  <path class="softLine" d="M696 340 C790 420, 932 426, 1058 480"/>
  <path class="softLine" d="M873 590 C930 618, 1043 602, 1094 590"/>

  <text x="1068" y="636" fill="#60798b" font-size="15" font-weight="700">访问指标</text>
  <text x="1068" y="664" fill="#60798b" font-size="15" font-weight="700">监控埋点</text>
  <text x="1068" y="692" fill="#60798b" font-size="15" font-weight="700">水位慢查</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">大促保障整体流程</title>
  <desc id="desc">从目标对齐到大促前、大促中、大促后的保障闭环流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#174a7c"/>
      <stop offset="1" stop-color="#216a9d"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d6b62"/>
      <stop offset="1" stop-color="#11917f"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a15c17"/>
      <stop offset="1" stop-color="#d9811f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#163047" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#587186"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
      .label { fill: #ffffff; font-size: 29px; font-weight: 800; letter-spacing: .5px; }
      .sub { fill: rgba(255,255,255,.88); font-size: 20px; font-weight: 500; }
      .eyebrow { fill: #315166; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
      .title { fill: #123047; font-size: 34px; font-weight: 900; }
      .note { fill: #5a7286; font-size: 18px; }
      .step { fill: #1f4057; font-size: 17px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1140" cy="70" r="112" fill="#d9eadf" opacity=".55"/>
  <circle cx="88" cy="330" r="140" fill="#d7e7f5" opacity=".58"/>
  <path d="M76 118 C250 42, 373 70, 520 115 S807 191, 991 102 1200 82, 1248 126" fill="none" stroke="#bfd8e7" stroke-width="3" opacity=".65"/>

  <text x="70" y="72" class="eyebrow">PROMOTION RELIABILITY PLAYBOOK</text>
  <text x="70" y="114" class="title">大促保障整体流程</text>
  <text x="70" y="146" class="note">围绕目标、准备、执行、复盘形成可执行闭环</text>

  <g transform="translate(70 206)">
    <rect width="278" height="128" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="18" y="18" width="10" height="92" rx="5" fill="#dfeaf4"/>
    <text x="52" y="54" fill="#17364c" font-size="27" font-weight="900">大促目标对齐</text>
    <text x="52" y="88" fill="#577082" font-size="18">GMV 相对日常倍数</text>
  </g>

  <path d="M366 270 H421" fill="none" stroke="#587186" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(442 184)">
    <rect width="238" height="170" rx="30" fill="url(#cardA)" filter="url(#shadow)"/>
    <text x="32" y="58" class="label">大促前</text>
    <text x="32" y="96" class="sub">压测 · 演练</text>
    <text x="32" y="128" class="sub">限流 · 应急预案</text>
    <circle cx="194" cy="52" r="24" fill="#ffffff" opacity=".18"/>
  </g>

  <path d="M698 270 H779" fill="none" stroke="#587186" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(800 184)">
    <rect width="238" height="170" rx="30" fill="url(#cardB)" filter="url(#shadow)"/>
    <text x="32" y="58" class="label">大促中</text>
    <text x="32" y="96" class="sub">监控 · 值班</text>
    <text x="32" y="128" class="sub">应急处理</text>
    <circle cx="194" cy="52" r="24" fill="#ffffff" opacity=".18"/>
  </g>

  <path d="M1056 270 H1137" fill="none" stroke="#587186" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(958 40)">
    <path d="M-6 321 C24 374, 112 390, 166 353" fill="none" stroke="#aec8d8" stroke-width="3" stroke-dasharray="9 10" opacity=".75"/>
  </g>

  <g transform="translate(1132 184)">
    <rect width="62" height="170" rx="30" fill="url(#cardC)" opacity=".92" filter="url(#shadow)"/>
  </g>
  <g transform="translate(1068 184)">
    <rect width="168" height="170" rx="30" fill="url(#cardC)" filter="url(#shadow)"/>
    <text x="28" y="58" class="label">大促后</text>
    <text x="28" y="96" class="sub">复盘 · 修复</text>
    <text x="28" y="128" class="sub">优化 · 沉淀</text>
  </g>

</svg>

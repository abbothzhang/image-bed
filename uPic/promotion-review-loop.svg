<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">大促后复盘闭环</title>
  <desc id="desc">从数据收集、问题归类、根因分析到行动项、责任人、验证和知识沉淀的复盘流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf8"/>
      <stop offset="1" stop-color="#edf5f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#153448" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#557082"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
      .title { fill: #153247; font-size: 34px; font-weight: 900; }
      .sub { fill: #627a8b; font-size: 18px; }
      .stepText { fill: #18384f; font-size: 22px; font-weight: 900; }
      .small { fill: #6d8290; font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <path d="M86 320 C268 248, 428 368, 638 290 S972 220, 1190 310" fill="none" stroke="#c8dce4" stroke-width="4" opacity=".75"/>
  <circle cx="1180" cy="78" r="104" fill="#e7ead8" opacity=".55"/>
  <circle cx="92" cy="352" r="122" fill="#dce9f2" opacity=".55"/>

  <text x="70" y="78" class="title">大促后复盘闭环</text>
  <text x="70" y="112" class="sub">把一次性保障经验沉淀成可验证、可追踪、可复用的工程能力</text>

  <g transform="translate(68 192)">
    <rect width="136" height="112" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="68" y="68" text-anchor="middle" class="stepText">数据收集</text>
  </g>
  <path d="M214 248 H268" fill="none" stroke="#557082" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(282 192)">
    <rect width="136" height="112" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="68" y="68" text-anchor="middle" class="stepText">问题归类</text>
  </g>
  <path d="M428 248 H482" fill="none" stroke="#557082" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(496 192)">
    <rect width="136" height="112" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="68" y="68" text-anchor="middle" class="stepText">根因分析</text>
  </g>
  <path d="M642 248 H696" fill="none" stroke="#557082" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(710 176)">
    <rect width="154" height="144" rx="30" fill="#173b61" filter="url(#shadow)"/>
    <text x="77" y="78" text-anchor="middle" fill="#fff" font-size="22" font-weight="900">行动项拆解</text>
    <text x="77" y="111" text-anchor="middle" fill="rgba(255,255,255,.84)" font-size="16" font-weight="700">短期 + 长期</text>
  </g>
  <path d="M874 248 H928" fill="none" stroke="#557082" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(942 192)">
    <rect width="164" height="112" rx="26" fill="#ffffff" filter="url(#shadow)"/>
    <text x="82" y="57" text-anchor="middle" class="stepText">责任人与</text>
    <text x="82" y="88" text-anchor="middle" class="stepText">截止时间</text>
  </g>

  <path d="M1024 315 C1006 374, 768 384, 634 336 C542 303, 526 308, 475 336 C408 372, 226 362, 164 319" fill="none" stroke="#95aeb9" stroke-width="2.5" stroke-dasharray="9 9" opacity=".8" marker-end="url(#arrow)"/>
  <text x="502" y="374" class="small">回归验证 → 知识沉淀与标准更新</text>

  <g transform="translate(1130 192)">
    <rect width="82" height="112" rx="26" fill="#0f756d" filter="url(#shadow)"/>
    <text x="41" y="69" text-anchor="middle" fill="#fff" font-size="22" font-weight="900">闭环</text>
  </g>
</svg>

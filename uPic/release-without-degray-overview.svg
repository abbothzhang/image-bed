    <text x="220" y="1168" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="220" y="1212" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>
    <text x="220" y="1256" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(正常)</text>
    <text x="220" y="1300" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(绿色)</text>

    <line x1="346" y1="1224" x2="392" y2="1224" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="426" y="1116" width="220" height="216" rx="24" fill="url(#greenCard)" stroke="#86EFAC" stroke-width="2"/>
    <text x="536" y="1168" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="536" y="1212" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>
    <text x="536" y="1256" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(正常)</text>
    <text x="536" y="1300" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(绿色)◄</text>

    <line x1="662" y1="1224" x2="708" y2="1224" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="742" y="1116" width="220" height="182" rx="24" fill="url(#greenCard)" stroke="#86EFAC" stroke-width="2"/>
    <text x="852" y="1168" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="852" y="1220" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>
    <text x="852" y="1272" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(绿色)</text>

    <line x1="978" y1="1207" x2="1024" y2="1207" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="1058" y="1116" width="220" height="182" rx="24" fill="url(#warnCard)" stroke="#FDBA74" stroke-width="2"/>
    <text x="1168" y="1168" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="1168" y="1220" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>
    <text x="1168" y="1272" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">C(绿色)</text>

    <text x="220" y="1356" text-anchor="middle" fill="#B45309" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A/B 不参与灰度，C 保留正常版并新增绿色版</text>
    <text x="852" y="1356" text-anchor="middle" fill="#B45309" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">路由需要同时兼容灰色、蓝色、绿色</text>
    <text x="1168" y="1356" text-anchor="middle" fill="#DC2626" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第四轮还要继续找新颜色</text>

    <text x="852" y="890" text-anchor="middle" fill="#B45309" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A 是灰色，B 是蓝色</text>
    <text x="1168" y="890" text-anchor="middle" fill="#DC2626" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">不同服务颜色开始分叉</text>

    <text x="852" y="760" text-anchor="middle" fill="#475569" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="852" y="832" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>

    <line x1="978" y1="795" x2="1024" y2="795" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="1058" y="704" width="220" height="182" rx="24" fill="url(#warnCard)" stroke="#FDBA74" stroke-width="2"/>
    <text x="1168" y="760" text-anchor="middle" fill="#475569" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="1168" y="832" text-anchor="middle" fill="#1D4ED8" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>


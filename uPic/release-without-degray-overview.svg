    <text x="852" y="402" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="852" y="468" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)</text>

    <line x1="978" y1="395" x2="1024" y2="395" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="1058" y="304" width="220" height="182" rx="24" fill="url(#warnCard)" stroke="#FDBA74" stroke-width="2"/>
    <text x="1168" y="402" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="1168" y="458" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)</text>


    <text x="110" y="596" fill="#7C2D12" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第二轮：只有 B 发布新版本，必须引入蓝色</text>
    <text x="110" y="634" fill="#2563EB" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B 已经是灰色，新版本不能再叫灰色，只能新增蓝色</text>
    <text x="122" y="678" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">蓝色部署</text>

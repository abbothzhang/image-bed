  <rect width="1440" height="1460" rx="36" fill="url(#bg)"/>
  <rect x="32" y="32" width="1376" height="1396" rx="28" fill="url(#grid)" opacity="0.45"/>

  <text x="720" y="96" text-anchor="middle" fill="#7C2D12" font-size="38" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">无去标：颜色持续累积，路由复杂度不断上升</text>
  <text x="720" y="138" text-anchor="middle" fill="#9A3412" font-size="20" font-weight="500" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">不去标意味着灰度标识永久保留，后续发布必须引入新颜色，最终形成多颜色并存</text>

  <g>

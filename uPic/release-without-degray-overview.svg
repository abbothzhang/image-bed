    <text x="110" y="1046" fill="#16A34A" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A 仍是灰色，B 已是蓝色，这一轮只有 C 新增绿色版本</text>
    <text x="122" y="1090" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">绿色部署</text>
    <text x="438" y="1090" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">逐步切流</text>
    <text x="754" y="1090" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">全量绿色</text>
    <text x="1060" y="1090" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">下线旧版本</text>


<svg width="1440" height="1460" viewBox="0 0 1440 1460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1320" y2="1400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F2"/>
      <stop offset="1" stop-color="#FFF3E8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF9F3"/>
    </linearGradient>
    <linearGradient id="grayCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#CDEBFF"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#C7F4D7"/>
    </linearGradient>
    <linearGradient id="warnCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFE9D5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#7C2D12" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#78716C"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#F0DCC8" stroke-width="1"/>
    </pattern>

    <text x="110" y="234" fill="#7C2D12" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第一轮：A、B 一起灰度发布</text>
    <text x="122" y="278" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰度部署</text>
    <text x="438" y="278" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">逐步切流</text>
    <text x="754" y="278" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">全量灰度</text>
    <text x="1060" y="278" fill="#A16207" font-size="18" font-weight="600" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">不去标，下线老部署</text>

    <rect x="110" y="304" width="220" height="182" rx="24" fill="url(#grayCard)" stroke="#CBD5E1" stroke-width="2"/>
    <text x="220" y="352" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(正常)</text>
    <text x="220" y="392" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)</text>
    <text x="220" y="432" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(正常)</text>
    <text x="220" y="472" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)</text>

    <line x1="346" y1="395" x2="392" y2="395" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="426" y="304" width="220" height="182" rx="24" fill="url(#grayCard)" stroke="#CBD5E1" stroke-width="2"/>
    <text x="536" y="352" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(正常)</text>
    <text x="536" y="392" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A(灰色)◄</text>
    <text x="536" y="432" text-anchor="middle" fill="#1E3A8A" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(正常)</text>
    <text x="536" y="472" text-anchor="middle" fill="#6B7280" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)◄</text>

    <line x1="662" y1="395" x2="708" y2="395" stroke="#78716C" stroke-width="3" marker-end="url(#arrow)"/>


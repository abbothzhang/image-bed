    <text x="220" y="800" text-anchor="middle" fill="#475569" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(灰色)</text>
    <text x="220" y="840" text-anchor="middle" fill="#2563EB" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">B(蓝色)</text>


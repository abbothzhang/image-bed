<svg width="1280" height="650" viewBox="0 0 1280 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1220" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F2F7FC"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFE7D1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#DCE5EF" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="650" rx="32" fill="url(#bg)"/>
  <rect x="24" y="24" width="1232" height="602" rx="24" fill="url(#grid)" opacity="0.45"/>

  <text x="640" y="82" text-anchor="middle" fill="#0F172A" font-size="34" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">路由规则变化对比</text>
  <text x="640" y="120" text-anchor="middle" fill="#475569" font-size="18" font-weight="500" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">有去标保持固定规则，无去标每轮都要重新定义颜色流转</text>

  <g>
    <rect x="64" y="164" width="460" height="390" rx="28" fill="url(#leftCard)" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
    <text x="98" y="210" fill="#166534" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">有去标</text>
    <text x="98" y="260" fill="#065F46" font-size="24" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">每轮路由规则固定</text>
    <rect x="96" y="298" width="396" height="120" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="294" y="352" text-anchor="middle" fill="#0F172A" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">正常 ↔ 灰色</text>
    <text x="294" y="392" text-anchor="middle" fill="#047857" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第一轮、第二轮、第三轮都不变</text>
    <text x="98" y="466" fill="#047857" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">ingress / dubbo / gRPC / pulsar</text>
    <text x="98" y="500" fill="#047857" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">始终复用同一套路由规则</text>
  </g>

  <g>
    <rect x="558" y="164" width="658" height="418" rx="28" fill="url(#rightCard)" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
    <text x="592" y="210" fill="#9A3412" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">无去标</text>
    <text x="592" y="252" fill="#C2410C" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">每一轮都会引入新的颜色流转规则</text>

    <rect x="592" y="286" width="590" height="56" rx="18" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="622" y="323" fill="#7C2D12" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第一轮</text>
    <text x="742" y="323" fill="#0F172A" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">正常</text>
    <text x="808" y="323" fill="#475569" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">→</text>
    <text x="844" y="323" fill="#6D28D9" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰色</text>

    <rect x="592" y="358" width="590" height="56" rx="18" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="622" y="395" fill="#7C2D12" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第二轮</text>
    <text x="742" y="395" fill="#6D28D9" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰色</text>
    <text x="808" y="395" fill="#475569" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">→</text>
    <text x="844" y="395" fill="#2563EB" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">蓝色</text>
    <text x="924" y="395" fill="#9A3412" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">A 保持灰色，只有 B 切蓝色</text>

    <rect x="592" y="430" width="590" height="56" rx="18" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="622" y="467" fill="#7C2D12" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第三轮</text>
    <text x="732" y="467" fill="#6D28D9" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">灰色</text>
    <text x="786" y="467" fill="#475569" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">/</text>
    <text x="814" y="467" fill="#2563EB" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">蓝色</text>
    <text x="880" y="467" fill="#475569" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">→</text>
    <text x="916" y="467" fill="#16A34A" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">绿色</text>
    <text x="1000" y="467" fill="#9A3412" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">两种源颜色同时切流</text>

    <rect x="592" y="496" width="590" height="56" rx="18" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <text x="622" y="533" fill="#7C2D12" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">第四轮</text>
    <text x="742" y="533" fill="#16A34A" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">绿色</text>
    <text x="808" y="533" fill="#475569" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">→</text>
    <text x="844" y="533" fill="#DC2626" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">???</text>
    <text x="924" y="533" fill="#DC2626" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">还得继续找新颜色</text>
  </g>
</svg>
